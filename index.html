<!-- Shows a readable message instead of a blank page if anything fails to load. -->
<script>
(function () {
  function show(msg) {
    var r = document.getElementById("root");
    if (r) r.innerHTML = '<div style="font:15px/1.5 -apple-system,system-ui,sans-serif;padding:28px;color:#7c2d12;max-width:540px;margin:40px auto;text-align:center"><div style="font-size:30px">⚠️</div><b>Puppy Log hit a snag</b><br><br>' + msg + '<br><br><span style="color:#a8a29e;font-size:13px">Open this page on a laptop, press F12 then Console, and send me the red error text.</span></div>';
  }
  window.addEventListener("error", function (e) {
    if (e.target && (e.target.tagName === "SCRIPT" || e.target.tagName === "LINK")) {
      show('A required file failed to load:<br><code style="font-size:12px">' + (e.target.src || e.target.href) + '</code><br><br>Usually a network/CDN hiccup, try refreshing.');
    } else if (e.message) { show(e.message); }
  }, true);
})();
</script>
